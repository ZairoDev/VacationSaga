name: Deploy to VPS (Zero-Downtime)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          command_timeout: 30m
          script: |
            set -e

            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "Starting zero-downtime deployment"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

            DEPLOY_DIR="/var/www/vacationsaga"
            NEW_BUILD_DIR="/var/www/vacationsaga_new_build"
            PM2_APP_NAME="vacationsaga"
            APP_PORT=3002
            REPO_URL="https://github.com/ZairoDev/VacationSaga.git"

            echo "Current status:"
            pm2 list | grep ${PM2_APP_NAME} || echo "App not running"

            echo ""
            echo "Preparing new build..."
            sudo rm -rf ${NEW_BUILD_DIR}
            sudo mkdir -p ${NEW_BUILD_DIR}
            sudo chown -R jenkins:jenkins ${NEW_BUILD_DIR}

            cd ${NEW_BUILD_DIR}
            git clone --depth 1 --branch main ${REPO_URL} .
            sudo chown -R jenkins:jenkins ${NEW_BUILD_DIR}

            if [ -f "${DEPLOY_DIR}/.env.production" ]; then
              cp "${DEPLOY_DIR}/.env.production" .
            fi
            if [ -f "${DEPLOY_DIR}/.env.local" ]; then
              cp "${DEPLOY_DIR}/.env.local" .
            fi
            if [ ! -f ".env.local" ] && [ -f ".env.production" ]; then
              cp .env.production .env.local
            fi

            echo ""
            echo "Installing dependencies..."
            npm ci || { echo "Install failed"; sudo rm -rf ${NEW_BUILD_DIR}; exit 1; }

            echo ""
            echo "Building..."
            sudo rm -rf .next
            npm run build || { echo "Build failed"; sudo rm -rf ${NEW_BUILD_DIR}; exit 1; }

            if [ ! -d ".next" ]; then
              echo "Build output missing (.next)"
              sudo rm -rf ${NEW_BUILD_DIR}
              exit 1
            fi

            sudo chown -R jenkins:jenkins ${NEW_BUILD_DIR}
            echo "Build size: $(du -sh .next | cut -f1)"

            echo ""
            echo "Swapping release..."
            pm2 delete ${PM2_APP_NAME} 2>/dev/null || true

            TEMP_OLD="${DEPLOY_DIR}_old"
            sudo rm -rf ${TEMP_OLD}
            sudo mv ${DEPLOY_DIR} ${TEMP_OLD} 2>/dev/null || true
            sudo mv ${NEW_BUILD_DIR} ${DEPLOY_DIR}
            sudo chown -R jenkins:jenkins ${DEPLOY_DIR}

            cd ${DEPLOY_DIR}
            pm2 start npm --name ${PM2_APP_NAME} --update-env -- start
            pm2 save

            echo ""
            echo "Health check..."
            sleep 15

            HEALTH_OK=false

            if pm2 describe ${PM2_APP_NAME} | grep -q "status.*online"; then
              sleep 10
              if pm2 describe ${PM2_APP_NAME} | grep -q "status.*online"; then
                HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "http://localhost:${APP_PORT}" || echo "000")
                if [ "${HTTP_CODE}" != "000" ]; then
                  HEALTH_OK=true
                fi
              fi
            fi

            if [ "${HEALTH_OK}" = false ]; then
              echo "Health check failed (PM2 or HTTP on port ${APP_PORT})"
              exit 1
            fi

            echo ""
            echo "Cleaning up previous release..."
            sudo rm -rf ${TEMP_OLD}

            echo ""
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "Deployment successful"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "Time: $(date)"
            pm2 list
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
