name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Placeholder values for compile-time / prerender only — not real secrets.
env:
  MONGODB_URI: mongodb://localhost:27017/vacationsaga-ci
  MONGO_DB_URL: mongodb://localhost:27017/vacationsaga-ci
  TOKEN_SECRET: ci-token-secret-not-for-production-use
  PAYMENT_TOKEN_SECRET: ci-payment-token-secret-not-for-production-use
  NEXT_PUBLIC_BASE_URL: http://localhost:3000
  NEXT_PUBLIC_URL: http://localhost:3000

jobs:
  typecheck:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

  lint:
    name: ESLint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

  build:
    name: Production build
    runs-on: ubuntu-latest
    needs: typecheck
    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          MONGODB_URI: mongodb://localhost:27017/vacationsaga-ci
          MONGO_DB_URL: mongodb://localhost:27017/vacationsaga-ci
          TOKEN_SECRET: ci-token-secret-not-for-production-use
          PAYMENT_TOKEN_SECRET: ci-payment-token-secret-not-for-production-use
          NEXT_PUBLIC_BASE_URL: http://localhost:3000
          NEXT_PUBLIC_URL: http://localhost:3000
